<svg width="100%" viewBox="0 0 800 2500" xmlns="http://www.w3.org/2000/svg" style="background:#ffffff;font-family:'Segoe UI',sans-serif;border:1px solid #e2e8f0;border-radius:12px;box-shadow:0 4px 6px -1px rgba(0, 0, 0, 0.1)">
  <defs>
    <marker id="arr-p" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><polygon points="0 0,10 5,0 10" fill="#e10098"/></marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3" /><feOffset dx="0" dy="2" result="offsetblur" />
      <feComponentTransfer><feFuncA type="linear" slope="0.1" /></feComponentTransfer>
      <feMerge><feMergeNode /><feMergeNode in="SourceGraphic" /></feMerge>
    </filter>
  </defs>

  <!-- BACKGROUND -->
  <rect x="0" y="0" width="800" height="2500" fill="#ffffff" />

  <!-- ═══ HEADER ═══ -->
  <rect x="0" y="0" width="800" height="100" fill="#fcfcfc" />
  <line x1="0" y1="100" x2="800" y2="100" stroke="#e2e8f0" stroke-width="1" />
  <text x="40" y="55" font-size="28" font-weight="bold" fill="#1a202c">GraphQL Mesh</text>
  <text x="40" y="80" font-size="14" fill="#e10098" font-weight="500">The Power of Unified Data Without the Rewrite</text>
  <text x="760" y="60" font-size="12" font-weight="bold" fill="#e10098" text-anchor="end">Network Spy Academy</text>

  <!-- ═══ SECTION 1: WHAT IS IT? ═══ -->
  <rect x="40" y="140" width="720" height="120" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1" />
  <text x="60" y="180" font-size="20" font-weight="bold" fill="#1a202c">What is GraphQL Mesh?</text>
  <text x="60" y="210" font-size="14" fill="#4a5568">GraphQL Mesh allows you to use GraphQL query language to access data from non-GraphQL sources</text>
  <text x="60" y="230" font-size="14" fill="#4a5568">(OpenAPI, gRPC, SQL, etc.) without changing the source or maintaining a complex gateway.</text>

  <!-- ═══ SECTION 2: TECHNICAL ARCHITECTURE ═══ -->
  <rect x="250" y="300" width="300" height="40" rx="20" fill="#3182ce" filter="url(#shadow)" />
  <text x="400" y="325" text-anchor="middle" font-size="18" font-weight="bold" fill="#ffffff">Technical Architecture</text>

  <!-- Diagram: Sources -> Handlers -> Transformers -> Unified Schema -->
  
  <!-- Sources -->
  <rect x="40" y="400" width="120" height="180" rx="10" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1" />
  <text x="100" y="430" text-anchor="middle" font-size="14" font-weight="bold" fill="#475569">Sources</text>
  <rect x="55" y="450" width="90" height="30" rx="4" fill="#fff" stroke="#cbd5e1" /><text x="100" y="470" text-anchor="middle" font-size="11" fill="#1e293b">REST API</text>
  <rect x="55" y="490" width="90" height="30" rx="4" fill="#fff" stroke="#cbd5e1" /><text x="100" y="510" text-anchor="middle" font-size="11" fill="#1e293b">gRPC</text>
  <rect x="55" y="530" width="90" height="30" rx="4" fill="#fff" stroke="#cbd5e1" /><text x="100" y="550" text-anchor="middle" font-size="11" fill="#1e293b">PostgreSQL</text>

  <line x1="160" y1="490" x2="220" y2="490" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr-p)" />

  <!-- Handlers -->
  <rect x="230" y="400" width="120" height="180" rx="10" fill="#dcfce7" stroke="#86efac" stroke-width="1" />
  <text x="290" y="430" text-anchor="middle" font-size="14" font-weight="bold" fill="#166534">Handlers</text>
  <text x="290" y="460" text-anchor="middle" font-size="10" fill="#166534">Convert Source</text>
  <text x="290" y="475" text-anchor="middle" font-size="10" fill="#166534">to GraphQL SDK</text>
  <circle cx="290" cy="520" r="25" fill="#166534" /><text x="290" y="525" text-anchor="middle" font-size="12" fill="#fff" font-weight="bold">Parse</text>

  <line x1="350" y1="490" x2="410" y2="490" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr-p)" />

  <!-- Transformers -->
  <rect x="420" y="400" width="120" height="180" rx="10" fill="#fee2e2" stroke="#fca5a5" stroke-width="1" />
  <text x="480" y="430" text-anchor="middle" font-size="14" font-weight="bold" fill="#991b1b">Transforms</text>
  <text x="480" y="460" text-anchor="middle" font-size="10" fill="#991b1b">Modify Schema</text>
  <rect x="435" y="480" width="90" height="20" rx="2" fill="#fff" /><text x="480" y="493" text-anchor="middle" font-size="9" fill="#991b1b">Rename Fields</text>
  <rect x="435" y="510" width="90" height="20" rx="2" fill="#fff" /><text x="480" y="523" text-anchor="middle" font-size="9" fill="#991b1b">Filter Types</text>
  <rect x="435" y="540" width="90" height="20" rx="2" fill="#fff" /><text x="480" y="553" text-anchor="middle" font-size="9" fill="#991b1b">Type Prefix</text>

  <line x1="540" y1="490" x2="600" y2="490" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr-p)" />

  <!-- Unified Schema -->
  <rect x="610" y="400" width="150" height="180" rx="10" fill="#f0abfc" stroke="#d946ef" stroke-width="2" filter="url(#shadow)" />
  <text x="685" y="430" text-anchor="middle" font-size="14" font-weight="bold" fill="#701a75">Unified API</text>
  <text x="685" y="465" text-anchor="middle" font-size="11" fill="#701a75">Single endpoint for</text>
  <text x="685" y="480" text-anchor="middle" font-size="11" fill="#701a75">all data sources.</text>
  <circle cx="685" cy="530" r="30" fill="#fff" stroke="#d946ef" stroke-width="2" />
  <text x="685" y="535" text-anchor="middle" font-size="12" font-weight="bold" fill="#d946ef">GraphQL</text>

  <!-- ═══ SECTION 3: WHY FOR BIG TEAMS? ═══ -->
  <rect x="250" y="650" width="300" height="40" rx="20" fill="#805ad5" filter="url(#shadow)" />
  <text x="400" y="675" text-anchor="middle" font-size="18" font-weight="bold" fill="#ffffff">Why for Big Teams?</text>

  <rect x="40" y="720" width="340" height="180" rx="12" fill="#f5f3ff" stroke="#ddd6fe" stroke-width="1" />
  <text x="60" y="755" font-size="16" font-weight="bold" fill="#1a202c">1. Gradual Migration</text>
  <text x="60" y="785" font-size="13" fill="#4a5568" xml:space="preserve">Big teams can't rewrite everything at once.</text>
  <text x="60" y="805" font-size="13" fill="#4a5568" xml:space="preserve">Mesh lets you keep REST/gRPC backends</text>
  <text x="60" y="825" font-size="13" fill="#4a5568" xml:space="preserve">while giving frontend teams GraphQL today.</text>

  <rect x="420" y="720" width="340" height="180" rx="12" fill="#f5f3ff" stroke="#ddd6fe" stroke-width="1" />
  <text x="440" y="755" font-size="16" font-weight="bold" fill="#1a202c">2. Decoupled Velocity</text>
  <text x="440" y="785" font-size="13" fill="#4a5568" xml:space="preserve">Frontend teams can shape the data</text>
  <text x="440" y="805" font-size="13" fill="#4a5568" xml:space="preserve">independently of backend schedules</text>
  <text x="440" y="825" font-size="13" fill="#4a5568" xml:space="preserve">using built-in Mesh Transformers.</text>

  <!-- ═══ SECTION 4: PROS &amp; CONS ═══ -->
  <rect x="250" y="950" width="300" height="40" rx="20" fill="#dd6b20" filter="url(#shadow)" />
  <text x="400" y="975" text-anchor="middle" font-size="18" font-weight="bold" fill="#ffffff">Pros &amp; Cons</text>

  <!-- Pros -->
  <rect x="40" y="1020" width="340" height="280" rx="12" fill="#f0fdf4" stroke="#86efac" stroke-width="1" />
  <text x="210" y="1055" text-anchor="middle" font-size="18" font-weight="bold" fill="#166534">PROS</text>
  <text x="60" y="1090" font-size="13" fill="#166534" font-weight="bold">• Zero Code Gateway</text>
  <text x="75" y="1110" font-size="12" fill="#4a5568">Declare sources in YAML, Mesh does the rest.</text>
  <text x="60" y="1140" font-size="13" fill="#166534" font-weight="bold">• Any Data Source</text>
  <text x="75" y="1160" font-size="12" fill="#4a5568">Supports OpenAPI, gRPC, SOAP, SQL, etc.</text>
  <text x="60" y="1190" font-size="13" fill="#166534" font-weight="bold">• Unified SDK</text>
  <text x="75" y="1210" font-size="12" fill="#4a5568">Generates a type-safe SDK for internal use.</text>
  <text x="60" y="1240" font-size="13" fill="#166534" font-weight="bold">• Edge Compatible</text>
  <text x="75" y="1260" font-size="12" fill="#4a5568">Can run on Cloudflare Workers, Vercel Edge.</text>

  <!-- Cons -->
  <rect x="420" y="1020" width="340" height="280" rx="12" fill="#fff1f2" stroke="#fca5a5" stroke-width="1" />
  <text x="590" y="1055" text-anchor="middle" font-size="18" font-weight="bold" fill="#991b1b">CONS</text>
  <text x="440" y="1090" font-size="13" fill="#991b1b" font-weight="bold">• Configuration Complexity</text>
  <text x="455" y="1110" font-size="12" fill="#4a5568">Large meshes need careful YAML management.</text>
  <text x="440" y="1140" font-size="13" fill="#991b1b" font-weight="bold">• Performance Overhead</text>
  <text x="455" y="1160" font-size="12" fill="#4a5568">Each transform adds some execution time.</text>
  <text x="440" y="1190" font-size="13" fill="#991b1b" font-weight="bold">• Debugging Layers</text>
  <text x="455" y="1210" font-size="12" fill="#4a5568">Errors can be masked by translation layers.</text>
  <text x="440" y="1240" font-size="13" fill="#991b1b" font-weight="bold">• Schema Bloat</text>
  <text x="455" y="1260" font-size="12" fill="#4a5568">Merging many sources can create huge schemas.</text>

  <!-- ═══ SECTION 5: EXAMPLE CONFIG ═══ -->
  <rect x="250" y="1350" width="300" height="40" rx="20" fill="#4a5568" filter="url(#shadow)" />
  <text x="400" y="1375" text-anchor="middle" font-size="18" font-weight="bold" fill="#ffffff">Example Config</text>

  <rect x="40" y="1420" width="720" height="250" rx="12" fill="#1a202c" filter="url(#shadow)" />
  <text x="60" y="1450" font-size="14" fill="#a0aec0" font-family="monospace"># .meshrc.yaml</text>
  <text x="60" y="1475" font-size="13" font-family="monospace"><tspan fill="#c678dd">sources:</tspan></text>
  <text x="75" y="1495" font-size="13" font-family="monospace"><tspan fill="#61afef">- name:</tspan> <tspan fill="#98c379">UsersService</tspan></text>
  <text x="90" y="1515" font-size="13" font-family="monospace"><tspan fill="#61afef">handler:</tspan></text>
  <text x="105" y="1535" font-size="13" font-family="monospace"><tspan fill="#abb2bf">openapi:</tspan></text>
  <text x="120" y="1555" font-size="13" font-family="monospace"><tspan fill="#abb2bf">source: </tspan><tspan fill="#98c379">https://api.acme.com/v1/users.json</tspan></text>
  <text x="75" y="1585" font-size="13" font-family="monospace"><tspan fill="#c678dd">transforms:</tspan></text>
  <text x="90" y="1605" font-size="13" font-family="monospace"><tspan fill="#61afef">- rename:</tspan></text>
  <text x="105" y="1625" font-size="13" font-family="monospace"><tspan fill="#abb2bf">from: </tspan><tspan fill="#98c379">user_id</tspan></text>
  <text x="105" y="1645" font-size="13" font-family="monospace"><tspan fill="#abb2bf">to: </tspan><tspan fill="#98c379">id</tspan></text>

  <!-- ═══ SECTION 6: PRODUCTION FEATURES ═══ -->
  <rect x="250" y="1750" width="300" height="40" rx="20" fill="#38a169" filter="url(#shadow)" />
  <text x="400" y="1775" text-anchor="middle" font-size="18" font-weight="bold" fill="#ffffff">Production Features</text>

  <!-- 1. Caching -->
  <rect x="40" y="1820" width="220" height="150" rx="12" fill="#f0fdf4" stroke="#86efac" stroke-width="1" />
  <text x="150" y="1855" text-anchor="middle" font-size="15" font-weight="bold" fill="#166534">Caching</text>
  <text x="55" y="1885" font-size="12" fill="#4a5568">• Response Caching</text>
  <text x="55" y="1905" font-size="12" fill="#4a5568">• Redis Support</text>
  <text x="55" y="1925" font-size="12" fill="#4a5568">• Stale-while-revalidate</text>

  <!-- 2. Security -->
  <rect x="290" y="1820" width="220" height="150" rx="12" fill="#fff1f2" stroke="#fca5a5" stroke-width="1" />
  <text x="400" y="1855" text-anchor="middle" font-size="15" font-weight="bold" fill="#991b1b">Security</text>
  <text x="305" y="1885" font-size="12" fill="#4a5568">• JWT Verification</text>
  <text x="305" y="1905" font-size="12" fill="#4a5568">• Header Injection</text>
  <text x="305" y="1925" font-size="12" fill="#4a5568">• Rate Limiting (Plugin)</text>

  <!-- 3. Mesh SDK -->
  <rect x="540" y="1820" width="220" height="150" rx="12" fill="#f0f9ff" stroke="#7dd3fc" stroke-width="1" />
  <text x="650" y="1855" text-anchor="middle" font-size="15" font-weight="bold" fill="#0369a1">Mesh SDK</text>
  <text x="555" y="1885" font-size="12" fill="#4a5568">• Type-safe SDK generation</text>
  <text x="555" y="1905" font-size="12" fill="#4a5568">• Zero-latency overhead</text>
  <text x="555" y="1925" font-size="12" fill="#4a5568">• Unified data fetching</text>

  <!-- ═══ SECTION 7: CLI COMMANDS ═══ -->
  <rect x="40" y="2020" width="720" height="180" rx="12" fill="#1a202c" stroke="#4a5568" stroke-width="1" />
  <text x="60" y="2055" font-size="18" font-weight="bold" fill="#ffffff">Mesh CLI: Essential Commands</text>
  
  <text x="80" y="2100" font-size="14" font-family="monospace">
    <tspan fill="#38a169">$</tspan> <tspan fill="#61afef">mesh start</tspan>
  </text>
  <text x="80" y="2120" font-size="11" fill="#a0aec0"># Start the Mesh gateway server locally</text>

  <text x="80" y="2150" font-size="14" font-family="monospace">
    <tspan fill="#38a169">$</tspan> <tspan fill="#61afef">mesh build</tspan>
  </text>
  <text x="80" y="2170" font-size="11" fill="#a0aec0"># Pre-parse sources and generate the unified schema</text>

  <text x="420" y="2100" font-size="14" font-family="monospace">
    <tspan fill="#38a169">$</tspan> <tspan fill="#61afef">mesh dev</tspan>
  </text>
  <text x="420" y="2120" font-size="11" fill="#a0aec0"># Development mode with hot-reloading</text>

  <text x="420" y="2150" font-size="14" font-family="monospace">
    <tspan fill="#38a169">$</tspan> <tspan fill="#61afef">mesh validate</tspan>
  </text>
  <text x="420" y="2170" font-size="11" fill="#a0aec0"># Check for schema conflicts and connectivity</text>

  <!-- ═══ FOOTER ═══ -->
  <rect x="0" y="2300" width="800" height="200" fill="#fcfcfc" />
  <line x1="0" y1="2300" x2="800" y2="2300" stroke="#e2e8f0" stroke-width="1" />
  <text x="400" y="2360" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a202c">Bridge the Gap with GraphQL Mesh</text>
  <text x="400" y="2385" text-anchor="middle" font-size="13" fill="#4a5568">Start your migration journey without rebuilding your entire infrastructure.</text>
  <text x="400" y="2450" text-anchor="middle" font-size="11" fill="#a0aec0">© 2026 Network Spy Academy · Made with GraphQL</text>

</svg>
