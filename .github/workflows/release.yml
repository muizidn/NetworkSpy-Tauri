name: Release
on:
  push:
    branches:
      - main
      - develop

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  get-version:
    runs-on: ubuntu-latest
    outputs:
      app_version: ${{ steps.bump.outputs.next_version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
      - name: Determine Version
        id: bump
        shell: bash
        run: |
          chmod +x scripts/bump-version.sh
          NEXT_VERSION=$(./scripts/bump-version.sh --dry-run)
          echo "Next Version: $NEXT_VERSION"
          echo "next_version=$NEXT_VERSION" >> $GITHUB_OUTPUT

  release:
    needs: get-version
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, ubuntu-22.04, windows-latest]
    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Perl
        uses: shogo82148/actions-setup-perl@v1
        with:
          perl-version: '5.34'

      - name: Install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libnm-dev libappindicator3-dev librsvg2-dev build-essential curl wget file jq

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: bun install

      - name: Apply Version
        shell: bash
        run: |
          NEXT_VERSION="${{ needs.get-version.outputs.app_version }}"
          # Strip 'v' prefix for JSON files
          VERSION_NUM=${NEXT_VERSION#v}
          echo "Applying Version: $NEXT_VERSION"
          
          # Update package.json
          jq ".version = \"$VERSION_NUM\"" package.json > package.json.tmp && mv package.json.tmp package.json
          
          # Update tauri.conf.json
          jq ".version = \"$VERSION_NUM\"" src-tauri/tauri.conf.json > tauri.conf.json.tmp && mv tauri.conf.json.tmp src-tauri/tauri.conf.json

      - name: Build the app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ needs.get-version.outputs.app_version }}
          releaseName: "Network Spy ${{ needs.get-version.outputs.app_version }}"
          releaseBody: "Automated release from ${{ github.ref_name }} branch."
          releaseDraft: true
          prerelease: ${{ github.ref_name != 'main' }}
