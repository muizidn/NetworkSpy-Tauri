name: Release
on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'src/**'
      - 'src-tauri/**'
      - 'package.json'
      - 'bun.lock'
      - 'vite.config.ts'
      - 'scripts/**'
  workflow_dispatch: 

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  get-version:
    runs-on: ubuntu-latest
    outputs:
      app_version: ${{ steps.bump.outputs.next_version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
      - name: Determine Version
        id: bump
        shell: bash
        run: |
          chmod +x scripts/bump-version.sh
          NEXT_VERSION=$(./scripts/bump-version.sh --dry-run)
          echo "Next Version: $NEXT_VERSION"
          echo "next_version=$NEXT_VERSION" >> $GITHUB_OUTPUT

  release:
    needs: get-version
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, ubuntu-22.04, windows-latest]
    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create .env file
        shell: bash
        env:
          APP_NAME: ${{ github.ref_name == 'main' && 'Network Spy' || 'Network Spy (DEV)' }}
          POSTHOG_KEY: ${{ secrets.VITE_PUBLIC_POSTHOG_KEY }}
          POSTHOG_HOST: ${{ secrets.VITE_PUBLIC_POSTHOG_HOST }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
        run: |
          echo "APP_NAME=$APP_NAME" > .env
          echo "VITE_PUBLIC_POSTHOG_KEY=$POSTHOG_KEY" >> .env
          echo "VITE_PUBLIC_POSTHOG_HOST=${POSTHOG_HOST:-https://app.posthog.com}" >> .env
          echo "VITE_SENTRY_DSN=$VITE_SENTRY_DSN" >> .env
          echo "SENTRY_DSN=$SENTRY_DSN" >> .env
          echo "SENTRY_AUTH_TOKEN=$SENTRY_AUTH_TOKEN" >> .env
          
          # Verify file contents (Secrets will stay masked by GitHub)
          cat .env

      - name: Setup Perl
        uses: shogo82148/actions-setup-perl@v1
        with:
          perl-version: '5.34'

      - name: Install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libnm-dev libappindicator3-dev librsvg2-dev build-essential curl wget file jq

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lockb') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install frontend dependencies
        run: bun install

      - name: Apply Version
        shell: bash
        run: |
          NEXT_VERSION="${{ needs.get-version.outputs.app_version }}"
          VERSION_NUM=${NEXT_VERSION#v}
          echo "Original Version: $VERSION_NUM"
          
          # Special handling for Windows MSI (numeric only segments < 65535)
          if [[ "${{ matrix.platform }}" == "windows-latest" && "$VERSION_NUM" == *"-"* ]]; then
            # Extract base version (major.minor.patch)
            BASE_VERSION=$(echo "$VERSION_NUM" | cut -d'-' -f1)
            # Extract last build number (e.g., from .1 or .2)
            BUILD_NUM=$(echo "$VERSION_NUM" | grep -oE '[0-9]+$' || echo "0")
            # Ensure build number is within MSI limits (0-65535)
            SAFE_BUILD_NUM=$((BUILD_NUM % 65536))
            VERSION_NUM="${BASE_VERSION}-${SAFE_BUILD_NUM}"
            echo "Sanitized for MSI & SemVer: $VERSION_NUM"
          fi
          
          # Update package.json
          jq ".version = \"$VERSION_NUM\"" package.json > package.json.tmp && mv package.json.tmp package.json
          
          # Update tauri.conf.json
          jq ".version = \"$VERSION_NUM\"" src-tauri/tauri.conf.json > tauri.conf.json.tmp && mv tauri.conf.json.tmp src-tauri/tauri.conf.json

      - name: Build the app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VITE_POSTHOG_KEY: ${{ secrets.VITE_POSTHOG_KEY }}
          VITE_POSTHOG_HOST: ${{ secrets.VITE_POSTHOG_HOST }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PASSWORD: ${{ secrets.TAURI_SIGNING_PASSWORD }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
        with:
          tagName: ${{ needs.get-version.outputs.app_version }}
          releaseName: "Network Spy ${{ needs.get-version.outputs.app_version }}"
          releaseBody: |
            ### Automated Build
            This release was automatically built from the **${{ github.ref_name }}** branch.

            - **Commit**: [${{ github.sha }}](${{ github.event.repository.html_url }}/commit/${{ github.sha }})
            - **Workflow Run**: [${{ github.run_id }}](${{ github.event.repository.html_url }}/actions/runs/${{ github.run_id }})
            - **Environment**: ${{ matrix.platform }}
          releaseDraft: ${{ github.ref_name != 'develop' }}
          prerelease: ${{ github.ref_name != 'main' }}

      - name: Sentry Release
        if: env.SENTRY_AUTH_TOKEN != ''
        uses: getsentry/action-release@v3
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: "network-spy"
          SENTRY_PROJECT: "desktop-app"
        with:
          release: ${{ needs.get-version.outputs.app_version }}
          sourcemaps: "./src-tauri/target/release/"
